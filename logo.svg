<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring for better visibility -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#e5e7eb" stroke-width="2"/>

